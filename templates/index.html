<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kampung Tani – Deteksi Penyakit</title>
    <link rel="stylesheet" href="static/css/style.css" />
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-brand">
            <div class="brand-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" />
                    <path d="M8 12s1.5 2 4 2 4-2 4-2" />
                    <line x1="9" y1="9" x2="9.01" y2="9" />
                    <line x1="15" y1="9" x2="15.01" y2="9" />
                </svg>
            </div>
            <div>
                <div class="brand-name">Kampung Tani</div>
                <div class="brand-status">Online | Siap membantu</div>
            </div>
        </div>
        <ul class="nav-links">
            <li><a href="#" class="nav-link active">Home</a></li>
            <li><a href="#" class="nav-link">Profile</a></li>
            <li><a href="#" class="nav-link">Deteksi Penyakit</a></li>
        </ul>
    </nav>

    <!-- Chat area -->
    <main class="chat-main">
        <div class="chat-window">

            <div class="message-list" id="messageList">
                <div class="msg-row bot">
                    <div class="bot-avatar">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10" />
                            <path d="M8 12s1.5 2 4 2 4-2 4-2" />
                            <line x1="9" y1="9" x2="9.01" y2="9" />
                            <line x1="15" y1="9" x2="15.01" y2="9" />
                        </svg>
                    </div>
                    <div class="bubble bot-bubble">
                        Halo! Saya asisten AI Deteksi Penyakit. Silakan upload foto tanaman Anda yang terlihat kurang
                        sehat. Saya akan menganalisanya untuk Anda.
                    </div>
                </div>
            </div>

            <!-- Upload zone -->
            <div class="upload-zone" id="uploadZone">
                <input type="file" id="fileInput" accept="image/*" class="file-hidden" />
                <div class="upload-icon-wrap">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                        <circle cx="12" cy="13" r="4" />
                    </svg>
                </div>
                <p class="upload-title">Upload foto tanaman</p>
                <p class="upload-sub">Klik atau tarik foto ke sini untuk mengecek kondisinya</p>
            </div>

        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
